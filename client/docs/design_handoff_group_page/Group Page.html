<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Group Page · Coupons</title>
  <style>
    html, body { margin: 0; padding: 0; background: #ECE3D0; font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="group-page.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "showAllCoupons": true,
      "layout": "list"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <IOSDevice width={390} height={844}>
            <GroupScreen tweaks={t}/>
          </IOSDevice>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Layout">
              <TweakRadio
                label="Coupon layout"
                value={t.layout}
                options={[{label:'List', value:'list'},{label:'Grid', value:'grid'}]}
                onChange={v => setTweak('layout', v)}
              />
              <TweakToggle
                label="Show multiple shared coupons"
                value={t.showAllCoupons}
                onChange={v => setTweak('showAllCoupons', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
